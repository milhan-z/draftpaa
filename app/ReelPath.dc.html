<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReelPath — Critical-Path Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#141311; --panel-bg:#1b1917; --card-bg:#221f1c;
    --text:#f5f4f2; --sub-text:#a39d97;
    --border:#2e2b27;
    --warm:#ff6a52; --warm-soft:#2c1713; --warm-border:#6e2f24;
    --edge:#453f3a; --bar-muted:#403a34;
    --grid-line:#272420; --hatch:rgba(168,162,158,.3);
    --chip-bg:#2a2723;
  }
  body.light {
    --bg:#f3f2ef; --panel-bg:#ffffff; --card-bg:#ffffff;
    --text:#1c1917; --sub-text:#79716b;
    --border:#e7e5e1;
    --warm:#e74b35; --warm-soft:#fdece9; --warm-border:#f1b4a9;
    --edge:#d6d3ce; --bar-muted:#cfccc6;
    --grid-line:#eeece8; --hatch:rgba(120,113,108,.32);
    --chip-bg:#f1efec;
  }
  *{box-sizing:border-box}
  body{margin:0}
  input[type=range]{cursor:pointer;height:18px}
  button:focus-visible,input:focus-visible{outline:2px solid currentColor;outline-offset:2px}
  button{font-family:inherit}

  /* Scrollbar styling for dark theme */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div style="height:100vh;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;overflow:hidden;">

  <!-- ═══ TOP BAR ═══ -->
  <div style="display:flex;align-items:center;gap:22px;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--panel-bg);flex:none;">

    <!-- Logo + Brand -->
    <div style="display:flex;align-items:center;gap:11px;">
      <div style="width:27px;height:27px;border-radius:7px;background:var(--warm);display:flex;align-items:center;justify-content:center;">
        <div style="width:9px;height:9px;border-radius:2px;background:#fff;transform:rotate(45deg);"></div>
      </div>
      <div>
        <div style="font-size:16px;font-weight:700;letter-spacing:-.015em;">ReelPath</div>
        <div style="font-size:11px;color:var(--sub-text);margin-top:1px;">Critical-path analyzer</div>
      </div>
    </div>

    <!-- Earliest finish -->
    <div style="margin-left:6px;padding-left:20px;border-left:1px solid var(--border);display:flex;align-items:baseline;gap:9px;">
      <span style="font-size:12px;color:var(--sub-text);">Earliest finish</span>
      <span id="makespan" style="font-family:'JetBrains Mono',monospace;font-size:27px;font-weight:600;color:var(--warm);line-height:1;letter-spacing:-.02em;">—</span>
      <span style="font-size:13px;color:var(--sub-text);">days</span>
    </div>

    <div style="flex:1;"></div>

    <!-- View / What-if toggle -->
    <div style="display:flex;background:var(--chip-bg);border:1px solid var(--border);border-radius:9px;padding:3px;">
      <button id="btn-view" onclick="setMode('view')" style="border:none;cursor:pointer;font-size:13px;font-weight:600;padding:6px 17px;border-radius:6px;background:var(--warm);color:#ffffff;transition:background .15s,color .15s;">View</button>
      <button id="btn-whatif" onclick="setMode('whatif')" style="border:none;cursor:pointer;font-size:13px;font-weight:600;padding:6px 17px;border-radius:6px;background:transparent;color:var(--sub-text);transition:background .15s,color .15s;">What-if</button>
    </div>

    <!-- Dark / Light toggle -->
    <button onclick="toggleDark()" style="display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12.5px;color:var(--text);padding:7px 12px;border-radius:8px;">
      <span id="dark-dot" style="width:13px;height:13px;border-radius:50%;border:1.5px solid var(--sub-text);background:var(--warm);"></span>
      <span id="dark-label">Light</span>
    </button>
  </div>

  <!-- ═══ MAIN ═══ -->
  <div style="flex:1;display:flex;min-height:0;">

    <!-- LEFT: DAG -->
    <div style="flex:1.5;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);">
      <!-- DAG header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);flex:none;">
        <div style="font-size:13px;font-weight:650;">Task dependency graph</div>
        <div style="display:flex;gap:15px;font-size:11.5px;color:var(--sub-text);">
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:3px;background:var(--warm);"></span>Critical path</span>
          <span style="display:flex;align-items:center;gap:6px;"><span style="width:10px;height:10px;border-radius:3px;background:var(--bar-muted);"></span>Has slack</span>
        </div>
      </div>

      <!-- DAG canvas -->
      <div id="dag-container" style="flex:1;overflow:auto;padding:18px;display:flex;align-items:center;justify-content:center;min-height:0;"></div>

      <!-- What-if panel (hidden in view mode) -->
      <div id="whatif-panel" style="display:none;border-top:1px solid var(--border);background:var(--panel-bg);padding:12px 16px 14px;max-height:230px;overflow:auto;flex:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;">
          <div style="display:flex;align-items:baseline;gap:9px;">
            <span style="font-size:12px;font-weight:650;">What-if — drag durations</span>
            <span style="font-size:11px;color:var(--sub-text);">a longer chain can become critical</span>
          </div>
          <button onclick="resetDurations()" style="border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11.5px;color:var(--sub-text);padding:4px 11px;border-radius:6px;">Reset</button>
        </div>
        <div id="sliders" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:11px 18px;"></div>
      </div>
    </div>

    <!-- RIGHT: GANTT -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <!-- Gantt header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);flex:none;">
        <div style="font-size:13px;font-weight:650;">Schedule</div>
        <div style="font-size:11.5px;color:var(--sub-text);">Gantt · earliest start (days)</div>
      </div>
      <!-- Gantt canvas -->
      <div style="flex:1;overflow:auto;padding:18px;min-height:0;">
        <div id="gantt-area" style="position:relative;"></div>
      </div>
    </div>
  </div>

  <!-- ═══ FOOTER ═══ -->
  <div style="border-top:1px solid var(--border);background:var(--panel-bg);padding:9px 22px;display:flex;align-items:center;gap:22px;font-size:11.5px;color:var(--sub-text);flex:none;flex-wrap:wrap;">
    <span style="display:flex;align-items:center;gap:8px;">
      <span id="verify-dot" style="width:7px;height:7px;border-radius:50%;background:var(--warm);"></span>
      <span style="color:var(--text);font-weight:600;" id="verify-label">Verified by 2 algorithms</span>
      <span id="verify-detail">— loading…</span>
    </span>
    <div style="flex:1;"></div>
    <div style="display:flex;align-items:center;gap:9px;">
      <span style="color:var(--text);">Topological longest-path</span>
      <div style="width:104px;height:6px;background:var(--chip-bg);border-radius:3px;overflow:hidden;"><div id="bar-a" style="width:0%;height:100%;background:var(--warm);border-radius:3px;transition:width .3s;"></div></div>
      <span id="time-a" style="font-family:'JetBrains Mono',monospace;width:52px;">—</span>
    </div>
    <div style="display:flex;align-items:center;gap:9px;">
      <span style="color:var(--text);">Bellman–Ford</span>
      <div style="width:104px;height:6px;background:var(--chip-bg);border-radius:3px;overflow:hidden;"><div id="bar-b" style="width:0%;height:100%;background:var(--bar-muted);border-radius:3px;transition:width .3s;"></div></div>
      <span id="time-b" style="font-family:'JetBrains Mono',monospace;width:52px;">—</span>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   ReelPath front-end — talks to the Flask backend at /solve.
   Core algorithms live in src/reelpath and are NOT touched.
   ═══════════════════════════════════════════════════════════ */

// ─── State ───────────────────────────────────────────────
const APP = { tasks: [], deps: [], origDur: {}, mode: 'view', dark: true };
let dagNaturalW = 0, dagNaturalH = 0;
let solveTimer = null;

// ─── API ─────────────────────────────────────────────────
async function loadSample() {
  try {
    const r = await fetch('/sample');
    const data = await r.json();
    APP.tasks = data.tasks;
    APP.deps  = data.deps;
    APP.origDur = {};
    for (const t of data.tasks) APP.origDur[t.id] = t.duration;
    buildSliders();
    solve();
  } catch (e) {
    document.getElementById('verify-detail').textContent = '— error loading sample: ' + e.message;
  }
}

async function solve() {
  try {
    const r = await fetch('/solve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks: APP.tasks, deps: APP.deps })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.message || data.error);
    render(data);
  } catch (e) {
    document.getElementById('verify-detail').textContent = '— error: ' + e.message;
  }
}

function debouncedSolve() {
  clearTimeout(solveTimer);
  solveTimer = setTimeout(solve, 110);
}

// ─── Mode & Theme toggles ───────────────────────────────
function setMode(m) {
  APP.mode = m;
  const isW = m === 'whatif';
  document.getElementById('whatif-panel').style.display = isW ? 'block' : 'none';
  document.getElementById('btn-view').style.background  = !isW ? 'var(--warm)' : 'transparent';
  document.getElementById('btn-view').style.color       = !isW ? '#ffffff' : 'var(--sub-text)';
  document.getElementById('btn-whatif').style.background = isW  ? 'var(--warm)' : 'transparent';
  document.getElementById('btn-whatif').style.color      = isW  ? '#ffffff' : 'var(--sub-text)';
  // Re-scale DAG since vertical space changed
  requestAnimationFrame(scaleDag);
}

function toggleDark() {
  APP.dark = !APP.dark;
  document.body.classList.toggle('light', !APP.dark);
  document.getElementById('dark-label').textContent = APP.dark ? 'Light' : 'Dark';
  document.getElementById('dark-dot').style.background = APP.dark ? 'var(--warm)' : 'transparent';
}

function resetDurations() {
  for (const t of APP.tasks) t.duration = APP.origDur[t.id];
  buildSliders();
  solve();
}

// ─── Slider builder ──────────────────────────────────────
function buildSliders() {
  const box = document.getElementById('sliders');
  box.innerHTML = '';
  for (const t of APP.tasks) {
    const wrap = document.createElement('div');
    wrap.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">' +
        '<span style="font-size:11.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + t.name + '</span>' +
        '<span id="sval-' + t.id + '" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;font-weight:600;color:var(--sub-text);">' + t.duration + 'd</span>' +
      '</div>' +
      '<input type="range" min="1" max="20" value="' + t.duration + '" id="srng-' + t.id + '" style="width:100%;accent-color:var(--warm);">';
    box.appendChild(wrap);
    const rng = wrap.querySelector('#srng-' + t.id);
    rng.addEventListener('input', function() {
      t.duration = parseInt(rng.value, 10);
      document.getElementById('sval-' + t.id).textContent = t.duration + 'd';
      debouncedSolve();
    });
  }
}

// ─── Main render ─────────────────────────────────────────
function render(data) {
  // Makespan header
  document.getElementById('makespan').textContent = data.makespan;

  // Footer verification
  const ok = data.crosscheck_ok;
  document.getElementById('verify-detail').textContent =
    ok ? ('\u2009— both agree, makespan = ' + data.makespan + '.')
       : '\u2009— MISMATCH!';

  // Footer timing bars
  const aMs = data.timing.A_ms, bMs = data.timing.B_ms;
  const maxMs = Math.max(aMs, bMs, 0.001);
  document.getElementById('bar-a').style.width = (aMs / maxMs * 100).toFixed(1) + '%';
  document.getElementById('bar-b').style.width = (bMs / maxMs * 100).toFixed(1) + '%';
  document.getElementById('time-a').textContent = aMs.toFixed(1) + ' ms';
  document.getElementById('time-b').textContent = bMs.toFixed(1) + ' ms';

  // Build lookup tables
  const sched = {};
  for (const row of data.schedule) sched[row.id] = row;
  const critical = new Set(data.critical_ids);

  // Update slider value colors
  for (const t of APP.tasks) {
    const el = document.getElementById('sval-' + t.id);
    if (el) el.style.color = critical.has(t.id) ? 'var(--warm)' : 'var(--sub-text)';
  }

  renderDAG(data, sched, critical);
  renderGantt(data, sched, critical);
}

// ─── DAG rendering ───────────────────────────────────────
function computeRanks() {
  const preds = {};
  for (const t of APP.tasks) preds[t.id] = [];
  for (const [i, j] of APP.deps) preds[j].push(i);
  const rank = {};
  function depth(id) {
    if (rank[id] !== undefined) return rank[id];
    let r = 0;
    for (const p of preds[id]) r = Math.max(r, depth(p) + 1);
    rank[id] = r;
    return r;
  }
  for (const t of APP.tasks) depth(t.id);
  return rank;
}

function renderDAG(data, sched, critical) {
  const container = document.getElementById('dag-container');
  const rank = computeRanks();

  // Group tasks into columns
  const cols = {};
  let maxCol = 0;
  for (const t of APP.tasks) {
    const c = rank[t.id];
    (cols[c] = cols[c] || []).push(t);
    maxCol = Math.max(maxCol, c);
  }

  // Layout constants (matching design proportions)
  const NW = 100, NH = 50, GX = 16, GY = 28, PAD = 10;
  let maxRows = 0;
  for (const c in cols) maxRows = Math.max(maxRows, cols[c].length);
  const W = PAD * 2 + (maxCol + 1) * NW + maxCol * GX;
  const H = Math.max(350, maxRows * NH + (maxRows - 1) * GY + 80);

  // Compute node positions
  const pos = {};
  for (let c = 0; c <= maxCol; c++) {
    const list = cols[c] || [];
    const colH = list.length * NH + (list.length - 1) * GY;
    const yOff = (H - colH) / 2;
    list.forEach(function(t, i) {
      pos[t.id] = { x: PAD + c * (NW + GX), y: yOff + i * (NH + GY) };
    });
  }

  const onCritPath = new Set(data.critical_path || []);

  // ── Build edges SVG ──
  var svg = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="position:absolute;left:0;top:0;overflow:visible;">';
  svg += '<defs><marker id="rp-arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">';
  svg += '<path d="M0.6,0.6 L6,3 L0.6,5.4" fill="none" stroke="context-stroke" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>';
  svg += '</marker></defs>';

  for (const [f, t] of APP.deps) {
    const a = pos[f], b = pos[t];
    if (!a || !b) continue;
    var sx = a.x + NW, sy = a.y + NH / 2;
    var tx = b.x - 3,  ty = b.y + NH / 2;
    var dx = Math.max(26, (tx - sx) * 0.5);
    var d  = 'M ' + sx + ' ' + sy + ' C ' + (sx + dx) + ' ' + sy + ' ' + (tx - dx) + ' ' + ty + ' ' + tx + ' ' + ty;
    var critEdge = onCritPath.has(f) && onCritPath.has(t) && critical.has(f) && critical.has(t);
    svg += '<path d="' + d + '" fill="none" stroke="' + (critEdge ? 'var(--warm)' : 'var(--edge)') + '" stroke-width="' + (critEdge ? 2.5 : 1.4) + '" marker-end="url(#rp-arrow)" style="transition:stroke .2s,stroke-width .2s;"/>';
  }
  svg += '</svg>';

  // ── Build node divs ──
  var nodes = '';
  for (const t of APP.tasks) {
    var p = pos[t.id];
    if (!p) continue;
    var cr = critical.has(t.id);
    var bg      = cr ? 'var(--warm-soft)' : 'var(--card-bg)';
    var bd      = cr ? 'var(--warm-border)' : 'var(--border)';
    var sub     = cr ? 'var(--warm)' : 'var(--sub-text)';
    var chipBg  = cr ? 'var(--warm)' : 'var(--chip-bg)';
    var chipFg  = cr ? '#ffffff' : 'var(--sub-text)';
    var dur     = t.duration;

    nodes += '<div style="position:absolute;left:' + p.x + 'px;top:' + p.y + 'px;width:100px;height:50px;'
      + 'background:' + bg + ';border:1.5px solid ' + bd + ';border-radius:10px;'
      + 'padding:7px 9px;display:flex;flex-direction:column;justify-content:space-between;'
      + 'box-shadow:0 1px 2px rgba(0,0,0,.05);transition:background .2s,border-color .2s;">'
      + '<div style="font-size:11.5px;font-weight:600;line-height:1.15;color:var(--text);letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + t.name + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;">'
        + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:9.5px;color:' + sub + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:42px;">#' + t.id + '</span>'
        + '<span style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;font-weight:600;background:' + chipBg + ';color:' + chipFg + ';padding:1px 6px;border-radius:5px;flex:none;">' + dur + 'd</span>'
      + '</div>'
    + '</div>';
  }

  // ── Assemble ──
  dagNaturalW = W;
  dagNaturalH = H;
  container.innerHTML =
    '<div id="dag-board" style="flex:none;position:relative;">' +
      '<div id="dag-inner" style="position:absolute;top:0;left:0;width:' + W + 'px;height:' + H + 'px;transform-origin:top left;">' +
        svg + nodes +
      '</div>' +
    '</div>';
  scaleDag();
}

function scaleDag() {
  var container = document.getElementById('dag-container');
  var board = document.getElementById('dag-board');
  var inner = document.getElementById('dag-inner');
  if (!container || !board || !inner || !dagNaturalW) return;
  var availW = container.clientWidth - 36;
  var availH = container.clientHeight - 36;
  var scaleW = availW / dagNaturalW;
  var scaleH = availH / dagNaturalH;
  var s = Math.max(0.35, Math.min(1, Math.min(scaleW, scaleH)));
  board.style.width  = Math.round(dagNaturalW * s) + 'px';
  board.style.height = Math.round(dagNaturalH * s) + 'px';
  inner.style.transform = 'scale(' + s + ')';
}

// ─── Gantt rendering ─────────────────────────────────────
function renderGantt(data, sched, critical) {
  var area = document.getElementById('gantt-area');
  var M = data.makespan || 1;
  var maxDays = Math.max(M + 2, 18);
  // Round up to next even number for nicer ticks
  if (maxDays % 2 !== 0) maxDays++;

  var html = '';

  // Tick labels row
  html += '<div style="display:grid;grid-template-columns:118px 1fr;margin-bottom:9px;">';
  html += '<div></div><div style="position:relative;height:14px;">';
  for (var d = 0; d <= maxDays; d += 2) {
    var pct = (d / maxDays * 100).toFixed(2);
    html += '<span style="position:absolute;left:' + pct + '%;transform:translateX(-50%);font-family:\'JetBrains Mono\',monospace;font-size:9.5px;color:var(--sub-text);">' + d + '</span>';
  }
  html += '</div></div>';

  // Grid lines (first layer, behind bars)
  html += '<div style="position:absolute;top:14px;bottom:0;left:118px;right:0;pointer-events:none;">';
  for (var d = 0; d <= maxDays; d += 2) {
    var pct = (d / maxDays * 100).toFixed(2);
    html += '<div style="position:absolute;top:9px;bottom:0;left:' + pct + '%;width:0;border-left:1px solid var(--grid-line);"></div>';
  }
  html += '</div>';

  // Task rows (stable order matching APP.tasks)
  const orderMap = {};
  APP.tasks.forEach(function(t, idx) { orderMap[t.id] = idx; });
  var rows = data.schedule.slice().sort(function(a, b) {
    return (orderMap[a.id] ?? 0) - (orderMap[b.id] ?? 0);
  });
  for (var ri = 0; ri < rows.length; ri++) {
    var row = rows[ri];
    var crit = critical.has(row.id);
    var barLeft  = (row.es / maxDays * 100).toFixed(2);
    var barW     = ((row.ef - row.es) / maxDays * 100).toFixed(2);
    var slackLeft = (row.ef / maxDays * 100).toFixed(2);
    var slackW    = ((row.lf - row.ef) / maxDays * 100).toFixed(2);
    var barColor = crit ? 'var(--warm)' : 'var(--bar-muted)';

    html += '<div style="display:grid;grid-template-columns:118px 1fr;align-items:center;height:31px;">';
    html += '<div style="font-size:11.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px;">' + row.name + '</div>';
    html += '<div style="position:relative;height:19px;">';
    html += '<div style="position:absolute;top:0;left:' + barLeft + '%;width:' + Math.max(parseFloat(barW), 1.2) + '%;height:19px;background:' + barColor + ';border-radius:5px;transition:left .2s,width .2s,background .2s;"></div>';
    if (parseFloat(slackW) > 0.4) {
      html += '<div style="position:absolute;top:0;left:' + slackLeft + '%;width:' + slackW + '%;height:19px;border-radius:5px;border:1px solid var(--border);background:repeating-linear-gradient(45deg,transparent,transparent 3px,var(--hatch) 3px,var(--hatch) 4.2px);transition:left .2s,width .2s;"></div>';
    }
    html += '</div></div>';
  }

  // Makespan marker
  var markerPct = (M / maxDays * 100).toFixed(2);
  html += '<div style="position:absolute;top:14px;bottom:0;left:118px;right:0;pointer-events:none;">';
  html += '<div style="position:absolute;top:9px;bottom:0;left:' + markerPct + '%;width:0;border-left:1.5px dashed var(--warm);"></div>';
  html += '<div style="position:absolute;top:-2px;left:' + markerPct + '%;transform:translateX(-50%);background:var(--warm);color:#fff;font-family:\'JetBrains Mono\',monospace;font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:4px;white-space:nowrap;">' + M + 'd</div>';
  html += '</div>';

  area.innerHTML = html;
}

// ─── Init ────────────────────────────────────────────────
loadSample();
new ResizeObserver(scaleDag).observe(document.getElementById('dag-container'));
</script>
